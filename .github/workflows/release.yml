name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      CARGO_TERM_COLOR: always
      CRATE_NAME: bwclient

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev libxrandr-dev libxi-dev libxinerama-dev libxcursor-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            libwayland-dev libgl1-mesa-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build (release)
        run: cargo build --release --locked

      - name: Prepare artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF -replace 'refs/tags/','' } else { '${{ github.run_number }}' }
          $name = "$env:CRATE_NAME-$version-Windows-${{ runner.arch }}"
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item "target/release/$env:CRATE_NAME.exe" "dist/$env:CRATE_NAME.exe"
          Compress-Archive -Path dist/* -DestinationPath "$name.zip"
          Write-Output "ASSET_PATHS=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="${GITHUB_REF#refs/tags/}"
          else
            version="${{ github.run_number }}"
          fi
          name="$CRATE_NAME-$version-${{ runner.os }}-${{ runner.arch }}"
          mkdir -p dist
          cp "target/release/$CRATE_NAME" dist/
          tar -czf "$name.tar.gz" -C dist .
          echo "ASSET_PATHS=$name.tar.gz" >> "$GITHUB_ENV"

      - name: Prepare artifact (macOS .app bundle)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="${GITHUB_REF#refs/tags/}"
          else
            version="${{ github.run_number }}"
          fi
          name="$CRATE_NAME-$version-macos-${{ runner.arch }}"
          APP="$CRATE_NAME.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "target/release/$CRATE_NAME" "$APP/Contents/MacOS/$CRATE_NAME"
          chmod +x "$APP/Contents/MacOS/$CRATE_NAME"
          # generate Info.plist from template if present
          if [ -f "assets/macos/Info.plist.template" ]; then
            sed -e "s|__BUNDLE_ID__|com.hkwk.$CRATE_NAME|g" -e "s|__VERSION__|$version|g" assets/macos/Info.plist.template > "$APP/Contents/Info.plist"
          else
            cat > "$APP/Contents/Info.plist" <<'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple Computer//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleName</key><string>__NAME__</string>
  <key>CFBundleIdentifier</key><string>com.hkwk.__NAME__</string>
  <key>CFBundleVersion</key><string>__VERSION__</string>
  <key>CFBundleExecutable</key><string>__EXEC__</string>
  <key>CFBundlePackageType</key><string>APPL</string>
</dict>
</plist>
EOF
            sed -i "s|__NAME__|$CRATE_NAME|g" "$APP/Contents/Info.plist"
            sed -i "s|__VERSION__|$version|g" "$APP/Contents/Info.plist"
            sed -i "s|__EXEC__|$CRATE_NAME|g" "$APP/Contents/Info.plist"
          fi
          # include icon if provided
          if [ -f "icons/$CRATE_NAME.icns" ]; then
            cp "icons/$CRATE_NAME.icns" "$APP/Contents/Resources/$CRATE_NAME.icns"
          fi
          # create zip
          zip -r "$name.zip" "$APP"
          # create dmg (macOS only)
          hdiutil create -volname "$CRATE_NAME" -srcfolder "$APP" -ov -format UDZO "$name.dmg"
          echo "ASSET_PATHS=$name.zip $name.dmg" >> "$GITHUB_ENV"

      - name: List generated artifacts
        run: ls -la

      - name: Upload artifact to workflow (debug)
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: "**/*.{zip,tar.gz,dmg}"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_PATHS }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
