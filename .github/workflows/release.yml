name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      CARGO_TERM_COLOR: always
      CRATE_NAME: bwclient

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev libxrandr-dev libxi-dev libxinerama-dev libxcursor-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            libwayland-dev libgl1-mesa-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build (release)
        run: cargo build --release --locked

      - name: Prepare artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF -replace 'refs/tags/','' } else { '${{ github.run_number }}' }
          $name = "$env:CRATE_NAME-$version-Windows-${{ runner.arch }}"
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item "target/release/$env:CRATE_NAME.exe" "dist/$env:CRATE_NAME.exe"
          Compress-Archive -Path dist/* -DestinationPath "$name.zip"
          Write-Output "ASSET_PATH=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare artifact (macOS/Linux)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="${GITHUB_REF#refs/tags/}"
          else
            version="${{ github.run_number }}"
          fi
          name="$CRATE_NAME-$version-${{ runner.os }}-${{ runner.arch }}"
          mkdir -p dist
          cp "target/release/$CRATE_NAME" dist/
          tar -czf "$name.tar.gz" -C dist .
          echo "ASSET_PATH=$name.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact to workflow (debug)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_PATH }}
          path: ${{ env.ASSET_PATH }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
